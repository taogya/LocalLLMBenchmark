prompt_id = "polite-rewrite-v1"
version = "1"
category = "rewrite"
title = "丁寧表現への書き換え"
description = "task_id 00004-02, 00006-03: 初期比較用の短い rewrite prompt。"
system_message = """
あなたは短文のリライト評価対象モデルです。
意味を変えずに、丁寧で自然な日本語へ書き換えてください。
"""
user_message = """
次の文を 1 文で丁寧な表現に書き換えてください。
出力には「少々お待ちください」を含め、「待って」は含めないでください。
元文: 明日の会議、資料まだなので少し待って。
"""
tags = ["baseline", "ja", "small-model-friendly"]

[recommended_generation]
temperature = 0.1
top_p = 0.95
max_output_tokens = 80
seed = 7

[evaluation_metadata]
primary_metric = "constraint_pass_rate"
reference_type = "none"
scorer = "constraint_pass"
difficulty = "starter"
language = "ja"
expected_output_format = "text"

[output_contract]
type = "text"
constraint_ids = [
	"single_sentence",
	"include_wait_phrase",
	"exclude_casual_wait",
]
required_phrases = ["少々お待ちください"]
forbidden_phrases = ["待って"]

[output_contract.sentence_count]
min = 1
max = 1

[metadata]
task_id = "00006-03"

[metadata.evaluation_reference]