[[models]]
model_key = "local.openai_compatible.readiness"
provider_id = "openai_compatible"
# リポジトリ同梱の LM Studio readiness slot 用 alias。actual downloaded model key ではない。
# provider 間の一貫性を優先する運用では、actual downloaded model key を使う別 model entry に置き換えられる。
provider_model_name = "llmb-minimal-chat"
capability_tags = ["local", "chat", "ja", "readiness", "openai-compatible"]

[models.default_generation]
temperature = 0.2
top_p = 0.95
max_output_tokens = 128

[models.metadata]
task_id = "00016-02"
usage = "readiness"
identity_mode = "alias"